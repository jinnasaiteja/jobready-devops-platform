apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fastapi
  template:
    metadata:
      labels:
        app: fastapi
    spec:
      containers:
      - name: fastapi
        image: 282048599244.dkr.ecr.us-east-1.amazonaws.com/jobready-fastapi:975746aac26205e343832f3f102273e0e06db30f
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
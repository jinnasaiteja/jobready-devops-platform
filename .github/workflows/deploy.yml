name: Deploy to EKS
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app
    env:
      AWS_REGION: us-east-1
      ECR_REPOSITORY: jobready-fastapi
      CLUSTER_NAME: devops-cluster

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to ECR
        run: |
            aws ecr get-login-password --region $AWS_REGION | \
            docker login --username AWS --password-stdin 282048599244.dkr.ecr.us-east-1.amazonaws.com
      - name: Build Docker image
        run: docker build -t $ECR_REPOSITORY:latest .
      - name: Tag image
        run: docker tag $ECR_REPOSITORY:latest 282048599244.dkr.ecr.us-east-1.amazonaws.com/$ECR_REPOSITORY:latest
      - name: Push to ECR
        run: docker push 282048599244.dkr.ecr.us-east-1.amazonaws.com/$ECR_REPOSITORY:latest
      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region $AWS_REGION --name $CLUSTER_NAME
      - name: Deploy to EKS
        run: |
          kubectl apply -f ../k8s/deployment.yaml
          kubectl apply -f ../k8s/service.yaml